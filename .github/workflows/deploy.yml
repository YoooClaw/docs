name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

# 部署到 Cloudflare Pages（自定义域 developer.yoooclaw.ai）。
# 需要在仓库 Secrets 配置：CLOUDFLARE_API_TOKEN、CLOUDFLARE_ACCOUNT_ID。
jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build site
        run: bun run build
      - name: Check Cloudflare credentials
        id: cf
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::未配置 CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID，跳过部署"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.enabled == 'true'
        run: |
          bunx wrangler pages deploy src/.vitepress/dist \
            --project-name developer-yoooclaw \
            --branch master \
            --commit-dirty=true
